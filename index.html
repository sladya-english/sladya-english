<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8F5F0;--card:#FFF;--dark:#1A2B26;--mut:#EDEAE3;--tx:#1D1D1F;--tx2:#555;--ac:#2A7858;--ach:#1F6347;--acl:#E6F1EB;--er:#C0392B;--erb:#FCEAE8;--fd:'Geologica',sans-serif;--fb:'Golos Text',sans-serif}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);font-size:17px;line-height:1.6}
.W{max-width:920px;margin:0 auto;padding:0 20px}
h1{font-family:var(--fd);font-size:clamp(32px,7vw,56px);font-weight:800;letter-spacing:-.03em;line-height:1.1}
h1 span{color:var(--ac)}
h2{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:10px;color:var(--ac)}
.tag{display:inline-block;padding:5px 14px;background:var(--acl);color:var(--ac);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:100px;margin-bottom:12px}
.hero{padding:40px 0 24px;text-align:center}
.hero p{font-size:15px;color:var(--tx2);max-width:480px;margin:6px auto 0}
.logo{width:80px;height:80px;border-radius:50%;display:block;margin:0 auto 10px;object-fit:cover}
.box{background:var(--card);border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.05);padding:24px 20px;margin-bottom:14px}
.btn{padding:11px 22px;border:none;border-radius:8px;font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:default}
.b1{background:var(--ac);color:#fff}.b2{background:var(--mut);color:var(--tx)}.b3{background:var(--er);color:#fff}.b4{background:var(--dark);color:#eee}
input[type=text]{width:100%;padding:11px 14px;border:2px solid var(--mut);border-radius:8px;font-family:var(--fb);font-size:15px;outline:none;text-align:center;margin-bottom:8px}
input:focus{border-color:var(--ac)}
.blocks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:640px){.blocks{grid-template-columns:1fr}}
.bc{background:var(--card);border-radius:12px;padding:18px 14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);border:2px solid transparent;transition:all .2s}
.bc:hover{border-color:rgba(42,120,88,.3);transform:translateY(-2px)}
.bc b{font-family:var(--fd);font-size:26px;font-weight:800;color:var(--ac);display:block;margin-bottom:2px}
.bc strong{font-size:13px;display:block;margin-bottom:1px}
.bc small{font-size:12px;color:var(--tx2)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-bottom:10px;border-bottom:2px solid var(--mut);flex-wrap:wrap;gap:6px}
.topbar .right{display:flex;gap:6px;flex-wrap:wrap}
.role{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:4px}
.role-s{background:var(--acl);color:var(--ac)}.role-a{background:var(--dark);color:#eee}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
@media(max-width:500px){.sr{grid-template-columns:repeat(2,1fr)}}
.st{background:var(--dark);border-radius:10px;padding:12px 8px;text-align:center;color:#EEE}
.st b{font-family:var(--fd);font-size:22px;font-weight:700;display:block}
.st small{font-size:10px;opacity:.7}
.vb{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.vb>span{font-size:12px;color:var(--tx2);font-weight:600;margin-right:3px}
.vn{width:36px;height:36px;border-radius:7px;border:2px solid var(--mut);background:var(--card);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.vn:hover{border-color:var(--ac);color:var(--ac)}
.vn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.vn.done{background:var(--acl);border-color:var(--ac);color:var(--ac)}
.ta{background:var(--card);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.04);padding:24px 20px;margin-bottom:12px}
.ta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--mut)}
.ta-top b{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--ac)}
.ta-top small{font-size:12px;color:var(--tx2);font-weight:600}
.tt{font-size:16px;line-height:1.7;margin-bottom:12px}
.gap{display:inline-block;min-width:120px;border-bottom:2px dashed var(--ac);text-align:center;font-weight:700;color:var(--ac);padding:2px 4px;margin:0 2px}
.tw{display:inline-block;padding:5px 14px;background:var(--dark);color:#EEE;font-weight:700;font-size:14px;letter-spacing:.05em;border-radius:7px;margin:3px 0 12px}
.ar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ai{flex:1;min-width:160px;padding:11px 12px;border:2px solid var(--mut);border-radius:7px;font-family:var(--fb);font-size:15px;outline:none}
.ai:focus{border-color:var(--ac)}.ai.ok{border-color:var(--ac);background:var(--acl)}.ai.no{border-color:var(--er);background:var(--erb)}
.ch{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}
@media(max-width:520px){.ch{grid-template-columns:1fr}}
.cb{padding:11px 12px;border:2px solid var(--mut);border-radius:7px;background:var(--card);font-family:var(--fb);font-size:14px;cursor:pointer;text-align:left;transition:all .15s}
.cb:hover{border-color:var(--ac);background:var(--acl)}
.cb.sel{border-color:var(--ac);background:var(--acl);font-weight:700}
.cb.ok{border-color:var(--ac);background:var(--acl);font-weight:700}
.cb.no{border-color:var(--er);background:var(--erb)}
.fb{margin-top:8px;padding:10px 14px;border-radius:7px;font-size:14px;font-weight:600}
.fb.ok{background:var(--acl);color:var(--ac)}.fb.no{background:var(--erb);color:var(--er)}
.fb i{font-style:normal;font-weight:400;font-size:13px;display:block;margin-top:2px;opacity:.85}
.sk{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:linear-gradient(135deg,#F7E6B0,#F5D76E);color:#7D6608;font-size:11px;font-weight:700;border-radius:100px;margin-left:6px}
.lt{font-size:14px;line-height:1.65;white-space:pre-line;padding:14px;background:var(--bg);border-radius:7px;border-left:3px solid var(--ac);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 5px;border-bottom:2px solid var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--tx2);font-weight:700}
td{padding:6px 5px;border-bottom:1px solid var(--mut)}
tr:nth-child(even) td{background:var(--bg)}
.num{text-align:right;font-weight:600;font-family:var(--fd);font-size:13px}
.summ{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
@media(max-width:600px){.summ{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--bg);border-radius:7px;padding:10px;text-align:center}
.sc b{display:block;font-family:var(--fd);font-size:20px;font-weight:700;color:var(--ac)}
.sc small{font-size:11px;color:var(--tx2)}
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.dc{background:var(--card);border-radius:10px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dc b{display:block;font-family:var(--fd);font-size:24px;font-weight:800;color:var(--ac)}
.dc small{font-size:11px;color:var(--tx2)}
.res{text-align:center;padding:28px 12px}
.res>b{font-family:var(--fd);font-size:44px;font-weight:800;color:var(--ac);display:block}
.res>p{font-size:16px;color:var(--tx2);margin:4px 0 14px}
.bar{width:100%;max-width:240px;height:7px;background:var(--mut);border-radius:100px;margin:0 auto 16px;overflow:hidden}
.fill{height:100%;background:var(--ac);border-radius:100px;transition:width .5s ease}
.weak{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;margin:2px}
.weak-low{background:var(--erb);color:var(--er)}.weak-mid{background:#FFF3CD;color:#856404}.weak-ok{background:var(--acl);color:var(--ac)}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 14px;border:2px solid var(--mut);border-radius:7px;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;background:var(--card)}
.tab:hover{border-color:var(--ac)}.tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.about-section{line-height:1.65;font-size:14px}
.about-section p{margin-bottom:8px}
@media(max-width:768px){.ta{padding:18px 14px}.hero{padding:30px 0 18px}}

ика фиксируется: правильность, затраченное время, номер попытки. Преподаватель видит полную аналитику: сводные показатели по классу, детальный лог, слабые зоны каждого ученика. Ученик видит только свои результаты.</p><h2>Технология</h2><p>Веб-приложение (HTML+JavaScript), размещённое на GitHub Pages. Доступно с любого устройства по ссылке или QR-коду без установки дополнительного ПО.</p></div><div style="text-align:center;margin-bottom:30px"><button class="btn b2" id="btn_bk">&#8592; Назад</button></div>';

function viewStudent(){
  DONE={};
  var my=SESSIONS.filter(function(r){return r.name===USER});
  var ml=LOG.filter(function(r){return r.name===USER});
  var mOk=0,mAll=0;my.forEach(function(r){mOk+=r.score;mAll+=r.total});
  var gO=0,gA=0,wO=0,wA=0,lO=0,lA=0;
  ml.forEach(function(r){if(r.block==='grammar'){gA++;if(r.ok)gO++}if(r.block==='wordform'){wA++;if(r.ok)wO++}if(r.block==='lexical'){lA++;if(r.ok)lO++}});
  var h='<div class="topbar"><div class="left"><strong>'+USER+'</strong><span class="role role-s">ученик</span></div><div class="right"><button class="btn b2" id="btn_out" style="font-size:12px;padding:6px 12px">Выйти</button></div></div>';
  h+='<div class="dash"><div class="dc"><b>'+my.length+'</b><small>Попыток</small></div><div class="dc"><b>'+(mAll>0?Math.round(mOk/mAll*100):0)+'%</b><small>Точность</small></div><div class="dc"><b>'+mOk+'/'+mAll+'</b><small>Верных</small></div></div>';
  if(mAll>0){h+='<div class="box"><h2>Слабые зоны</h2><div>'+wk(gO,gA,'Грамматика')+wk(wO,wA,'Словообр.')+wk(lO,lA,'Лексика')+'</div></div>'}
  h+='<div class="blocks"><div class="bc" id="bl_g"><b>19-24</b><strong>Грамматика</strong><small>10 вариантов</small></div><div class="bc" id="bl_w"><b>25-29</b><strong>Словообразование</strong><small>10 вариантов</small></div><div class="bc" id="bl_l"><b>30-36</b><strong>Лексика</strong><small>10 вариантов</small></div></div>';
  if(my.length>0){h+='<div class="box"><h2>Мои попытки</h2><table><thead><tr><th>Блок</th><th>Вар.</th><th>Поп.</th><th class="num">Балл</th><th class="num">%</th><th class="num">Время</th><th>Дата</th></tr></thead><tbody>';my.forEach(function(r){h+='<tr><td>'+BN[r.block]+'</td><td>'+r.variant+'</td><td>'+r.attempt+'</td><td class="num">'+r.score+'/'+r.total+'</td><td class="num">'+Math.round(r.score/r.total*100)+'%</td><td class="num">'+ft(r.time)+'</td><td>'+r.date+'</td></tr>'});h+='</tbody></table></div>'}
  h+='<div id="game"></div>';
  R.innerHTML=h;
  $('btn_out').onclick=viewLogin;
  $('bl_g').onclick=function(){startGame('grammar')};
  $('bl_w').onclick=function(){startGame('wordform')};
  $('bl_l').onclick=function(){startGame('lexical')};
}

function wk(ok,all,nm){var p=all>0?Math.round(ok/all*100):0;var c=p>=75?'weak-ok':p>=50?'weak-mid':'weak-low';return'<span class="weak '+c+'">'+nm+': '+p+'% ('+ok+'/'+all+')</span> '}

function viewAdmin(){
  var tok=0,tall=0,names={};
  SESSIONS.forEach(function(r){tok+=r.score;tall+=r.total;if(!names[r.name])names[r.name]={ok:0,all:0,cnt:0,bl:{}};names[r.name].ok+=r.score;names[r.name].all+=r.total;names[r.name].cnt++;if(!names[r.name].bl[r.block])names[r.name].bl[r.block]={ok:0,all:0};names[r.name].bl[r.block].ok+=r.score;names[r.name].bl[r.block].all+=r.total});
  var uc=Object.keys(names).length;
  var h='<div class="topbar"><div class="left"><strong>Панель учителя</strong><span class="role role-a">администратор</span></div><div class="right"><button class="btn b3" id="btn_rst" style="font-size:12px;padding:6px 12px">Сбросить</button><button class="btn b2" id="btn_out2" style="font-size:12px;padding:6px 12px">Выйти</button></div></div>';
  h+='<div class="box"><h2>Сводка</h2><div class="summ"><div class="sc"><b>'+uc+'</b><small>Учеников</small></div><div class="sc"><b>'+SESSIONS.length+'</b><small>Сессий</small></div><div class="sc"><b>'+(tall>0?Math.round(tok/tall*100):0)+'%</b><small>Ср. точность</small></div><div class="sc"><b>'+LOG.length+'</b><small>Ответов</small></div></div></div>';
  h+='<div class="tabs" id="tabs"><button class="tab on" data-t="students">По ученикам</button><button class="tab" data-t="sessions">Сессии</button><button class="tab" data-t="log">Лог ответов</button></div><div id="tc"></div>';
  R.innerHTML=h;
  $('btn_out2').onclick=viewLogin;
  $('btn_rst').onclick=function(){if(confirm('Удалить ВСЕ данные?')){LOG=[];SESSIONS=[];viewAdmin()}};
  document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});this.classList.add('on');renderTab(this.dataset.t)}});
  renderTab('students');
}

function renderTab(t){
  var c=$('tc');if(!c)return;
  if(t==='students'){
    var names={};SESSIONS.forEach(function(r){if(!names[r.name])names[r.name]={ok:0,all:0,cnt:0,bl:{}};names[r.name].ok+=r.score;names[r.name].all+=r.total;names[r.name].cnt++;if(!names[r.name].bl[r.block])names[r.name].bl[r.block]={ok:0,all:0};names[r.name].bl[r.block].ok+=r.score;names[r.name].bl[r.block].all+=r.total});
    var h='<div class="box"><table><thead><tr><th>Ученик</th><th class="num">Сессий</th><th class="num">Точн.</th><th>Грамм.</th><th>Словообр.</th><th>Лексика</th></tr></thead><tbody>';
    Object.keys(names).sort().forEach(function(n){var d=names[n];
      function bp(bl){var x=d.bl[bl];if(!x)return'-';var p=Math.round(x.ok/x.all*100);return'<span class="weak '+(p>=75?'weak-ok':p>=50?'weak-mid':'weak-low')+'">'+p+'%</span>'}
      h+='<tr><td><strong>'+n+'</strong></td><td class="num">'+d.cnt+'</td><td class="num">'+Math.round(d.ok/d.all*100)+'%</td><td>'+bp('grammar')+'</td><td>'+bp('wordform')+'</td><td>'+bp('lexical')+'</td></tr>'});
    h+='</tbody></table></div>';c.innerHTML=h;
  }
  if(t==='sessions'){
    var h='<div class="box"><table><thead><tr><th>Ученик</th><th>Блок</th><th>Вар.</th><th>Поп.</th><th class="num">Балл</th><th class="num">%</th><th class="num">Время</th><th>Дата</th></tr></thead><tbody>';
    SESSIONS.slice().reverse().forEach(function(r){h+='<tr><td><strong>'+r.name+'</strong></td><td>'+BN[r.block]+'</td><td>'+r.variant+'</td><td>'+r.attempt+'</td><td class="num">'+r.score+'/'+r.total+'</td><td class="num">'+Math.round(r.score/r.total*100)+'%</td><td class="num">'+ft(r.time)+'</td><td>'+r.date+'</td></tr>'});
    h+='</tbody></table></div>';c.innerHTML=h;
  }
  if(t==='log'){
    var last=LOG.slice(-80).reverse();
    var h='<div class="box"><p style="font-size:12px;color:var(--tx2);margin-bottom:8px">Последние 80 из '+LOG.length+' записей</p><table><thead><tr><th>Ученик</th><th>Блок</th><th>Задание</th><th>Ответ</th><th>Верный</th><th>Рез.</th><th class="num">Сек.</th><th>Дата</th></tr></thead><tbody>';
    last.forEach(function(r){h+='<tr><td>'+r.name+'</td><td>'+BN[r.block]+'</td><td>'+r.question+'</td><td><code>'+r.answer+'</code></td><td><code>'+r.correct+'</code></td><td style="color:'+(r.ok?'var(--ac)':'var(--er)')+';font-weight:700">'+(r.ok?'&#10003;':'&#10007;')+'</td><td class="num">'+r.time+'</td><td>'+r.date+'</td></tr>'});
    h+='</tbody></table></div>';c.innerHTML=h;
  }
}

function startGame(b){
  var prev=SESSIONS.filter(function(r){return r.name===USER&&r.block===b});
  S={block:b,vi:0,qi:0,ok:0,all:0,ans:false,sel:null,streak:0,mx:0,tmr:null,sec:0,att:prev.length+1,qs:0};
  if(S.tmr)clearInterval(S.tmr);
  S.tmr=setInterval(function(){S.sec++;var el=$('sTime');if(el)el.textContent=ft(S.sec)},1000);
  drawGame();
}

function drawGame(){
  var g=$('game');if(!g)return;
  var vs=G[S.block];
  var h='<div class="sr"><div class="st"><b id="sOk">'+S.ok+'</b><small>Верных</small></div><div class="st"><b id="sAll">'+S.all+'</b><small>Всего</small></div><div class="st"><b id="sPct">'+(S.all?Math.round(S.ok/S.all*100)+'%':'--')+'</b><small>Точн.</small></div><div class="st"><b id="sTime">'+ft(S.sec)+'</b><small>Время</small></div></div>';
  h+='<div class="vb"><span>Вариант:</span>';
  for(var j=0;j<vs.length;j++){var dk=S.block+'_'+j;h+='<button class="vn'+(j===S.vi?' on':'')+(DONE[dk]?' done':'')+'" data-v="'+j+'">'+(j+1)+'</button>'}
  h+='</div><div id="task"></div><div style="margin:10px 0 30px"><button class="btn b2" id="btn_bk2">&#8592; Назад</button></div>';
  g.innerHTML=h;g.scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.vn').forEach(function(b){b.onclick=function(){S.vi=+this.dataset.v;S.qi=0;S.ans=false;S.sel=null;drawGame()}});
  $('btn_bk2').onclick=function(){if(S.tmr)clearInterval(S.tmr);viewStudent()};
  S.qs=ts();drawQ();
}

function drawQ(){
  var a=$('task');if(!a)return;S.qs=ts();
  if(S.block==='lexical'){var v=G.lexical[S.vi];var q=v.q[S.qi],tot=v.q.length;
    a.innerHTML='<div class="ta"><div class="ta-top"><b>Задание '+q.n+'</b><small>'+(S.qi+1)+'/'+tot+skH()+'</small></div><div class="lt">'+v.i+'</div><p style="font-weight:700;color:var(--ac);margin-bottom:6px;font-size:15px">Пропуск {'+q.n+'}</p><div class="ch">'+q.o.map(function(o,j){return'<button class="cb" data-c="'+j+'">'+(j+1)+') '+o+'</button>'}).join('')+'</div><div style="margin-top:8px"><button class="btn b1" id="actB">Проверить</button></div><div id="fbk"></div></div>';
    document.querySelectorAll('.cb').forEach(function(b){b.onclick=function(){if(S.ans)return;S.sel=+this.dataset.c;document.querySelectorAll('.cb').forEach(function(x){x.classList.remove('sel')});this.classList.add('sel')}});
    $('actB').onclick=chkC;
  } else {
    var sn=S.block==='grammar'?19:25;var qq=G[S.block][S.vi];var q=qq[S.qi],tot=qq.length;
    a.innerHTML='<div class="ta"><div class="ta-top"><b>Задание '+(sn+S.qi)+'</b><small>'+(S.qi+1)+'/'+tot+skH()+'</small></div><div class="tt">'+q.t.replace('___','<span class="gap" id="gE"></span>')+'</div><div class="tw">'+q.w+'</div><div class="ar"><input type="text" class="ai" id="aI" placeholder="Ответ..." autocomplete="off" spellcheck="false"><button class="btn b1" id="actB">Проверить</button></div><div id="fbk"></div></div>';
    var inp=$('aI');if(inp){inp.focus();inp.onkeydown=function(e){if(e.key==='Enter'&&!S.ans)$('actB').click()}}
    $('actB').onclick=chkI;
  }
}

function skH(){return S.streak>=3?' <span class="sk">&#128293; '+S.streak+'</span>':''}

function logA(qn,ua,ca,ok){LOG.push({name:USER,block:S.block,variant:S.vi+1,qnum:S.qi,question:qn,answer:ua,correct:ca,ok:ok,date:now(),time:ts()-S.qs})}

function chkI(){
  if(S.ans)return;var inp=$('aI'),v=inp.value.trim().toLowerCase();if(!v)return;
  S.ans=true;S.all++;var qq=G[S.block][S.vi],q=qq[S.qi],ok=v===q.a.toLowerCase();
  if(ok){S.ok++;S.streak++;if(S.streak>S.mx)S.mx=S.streak}else S.streak=0;
  inp.disabled=true;inp.classList.add(ok?'ok':'no');
  if(ok){var g=$('gE');if(g)g.textContent=q.a}
  logA(q.w,v,q.a,ok);fb(ok,q.a,q.h);updS();nb(S.block==='grammar'?6:5);
}

function chkC(){
  if(S.sel===null||S.ans)return;S.ans=true;S.all++;
  var v=G.lexical[S.vi],q=v.q[S.qi],ok=S.sel===q.a;
  if(ok){S.ok++;S.streak++;if(S.streak>S.mx)S.mx=S.streak}else S.streak=0;
  document.querySelectorAll('.cb').forEach(function(b){b.style.pointerEvents='none';var j=+b.dataset.c;if(j===q.a)b.classList.add('ok');if(j===S.sel&&!ok)b.classList.add('no')});
  logA('Пропуск {'+q.n+'}',q.o[S.sel],q.o[q.a],ok);fb(ok,q.o[q.a],q.h);updS();nb(7);
}

function fb(ok,ans,hint){var el=$('fbk');if(el)el.innerHTML=ok?'<div class="fb ok">&#10003; Верно!</div>':'<div class="fb no">&#10007; Ответ: <strong>'+ans+'</strong><i>'+hint+'</i></div>'}

function nb(tot){var b=$('actB');if(!b)return;if(S.qi<tot-1){b.textContent='Далее \u2192';b.onclick=function(){S.qi++;S.ans=false;S.sel=null;drawQ()}}else{b.textContent='Результат';b.onclick=endGame}}

function endGame(){
  if(S.tmr)clearInterval(S.tmr);
  var pct=S.all?Math.round(S.ok/S.all*100):0;
  DONE[S.block+'_'+S.vi]=true;
  SESSIONS.push({name:USER,block:S.block,variant:S.vi+1,score:S.ok,total:S.all,time:S.sec,date:now(),attempt:S.att});S.att++;
  var a=$('task');if(!a)return;
  a.innerHTML='<div class="ta"><div class="res"><b>'+S.ok+' / '+S.all+'</b><p>'+pct+'%</p><div class="bar"><div class="fill" id="rF"></div></div><div class="dash" style="max-width:340px;margin:0 auto 16px"><div class="dc"><b>'+ft(S.sec)+'</b><small>Время</small></div><div class="dc"><b>'+S.mx+'</b><small>Серия</small></div><div class="dc"><b>'+(S.all?Math.round(S.sec/S.all):0)+'с</b><small>Ср./зад.</small></div></div><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap"><button class="btn b1" id="br">Повторить</button><button class="btn b2" id="bn">Следующий</button><button class="btn b2" id="bh">Назад</button></div></div></div>';
  setTimeout(function(){var f=$('rF');if(f)f.style.width=pct+'%'},50);
  $('br').onclick=function(){S.qi=0;S.ok=0;S.all=0;S.ans=false;S.sel=null;S.streak=0;S.mx=0;S.sec=0;clearInterval(S.tmr);S.tmr=setInterval(function(){S.sec++;var el=$('sTime');if(el)el.textContent=ft(S.sec)},1000);drawGame()};
  $('bn').onclick=function(){S.vi=(S.vi+1)%G[S.block].length;S.qi=0;S.ok=0;S.all=0;S.ans=false;S.sel=null;S.streak=0;S.mx=0;S.sec=0;clearInterval(S.tmr);S.tmr=setInterval(function(){S.sec++;var el=$('sTime');if(el)el.textContent=ft(S.sec)},1000);drawGame()};
  $('bh').onclick=function(){viewStudent()};
}

function updS(){var a=$('sOk'),b=$('sAll'),c=$('sPct');if(a)a.textContent=S.ok;if(b)b.textContent=S.all;if(c)c.textContent=S.all?Math.round(S.ok/S.all*100)+'%':'--'}

viewLogin();
</script>
</body>
</html>
